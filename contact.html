<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Portfolio</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet" />

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.js"></script>
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    :root {
      --bg: #0d0d0d;
      --card: #111318;
      --card2: #16191f;
      --blue: #00b4ff;
      --cyan: #00eeff;
      --white: #e8f0ff;
      --muted: #7a8ab0;
      --border: rgba(0, 180, 255, .12);
      --red: #ff4d6d;
      --green: #00e096;
    }

    html {
      scroll-behavior: smooth
    }

    body {
      background: var(--bg);
      color: var(--white);
      font-family: "DM Sans", sans-serif;
      min-height: 100vh;
    }

    /* PAGE */
    .page {
      display: grid;
      grid-template-columns: 300px 1fr;
      min-height: 100vh;
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 24px;
      gap: 24px;
    }

    /* SIDEBAR */
    .sidebar {
      background: var(--card);
      border-radius: 20px;
      border: 1px solid var(--border);
      padding: 32px 24px 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: fit-content;
      position: sticky;
      top: 32px;
    }

    .avatar-wrap {
      position: relative;
      width: 140px;
      height: 140px;
      margin-bottom: 18px;
    }

    .avatar-wrap::before {
      content: "";
      position: absolute;
      inset: -3px;
      border-radius: 22px;
      background: linear-gradient(135deg, var(--blue), var(--cyan), #7f5af0);
      z-index: 0;
    }

    .avatar-inner {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      border-radius: 20px;
      overflow: hidden;
      background: #0a1535;
    }

    .avatar-inner img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
    }

    .sidebar-name {
      font-family: "Syne", sans-serif;
      font-size: 1.35rem;
      font-weight: 800;
      color: var(--white);
      text-align: center;
      margin-bottom: 10px;
    }

    .sidebar-role {
      background: rgba(255, 255, 255, .07);
      border: 1px solid rgba(255, 255, 255, .1);
      border-radius: 8px;
      padding: 6px 18px;
      font-size: .82rem;
      color: var(--muted);
      margin-bottom: 28px;
    }

    .divider {
      width: 100%;
      height: 1px;
      background: var(--border);
      margin-bottom: 24px;
    }

    .contact-list {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 18px;
      margin-bottom: 28px;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .contact-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: rgba(0, 180, 255, .1);
      border: 1px solid rgba(0, 180, 255, .2);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .contact-icon svg {
      width: 16px;
      height: 16px;
    }

    .contact-text {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .contact-label {
      font-size: .68rem;
      color: var(--muted);
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .contact-val {
      font-size: .88rem;
      color: var(--white);
      font-weight: 500;
    }

    .socials {
      display: flex;
      gap: 12px;
      justify-content: center;
      width: 100%;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    .soc-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: rgba(0, 180, 255, .07);
      border: 1px solid rgba(0, 180, 255, .18);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--blue);
      text-decoration: none;
      transition: all .2s;
    }

    .soc-icon:hover {
      background: var(--blue);
      color: #000;
      box-shadow: 0 0 16px #00b4ff66;
    }

    .soc-icon svg {
      width: 17px;
      height: 17px;
      fill: currentColor;
    }

    /* CONTENT PANEL */
    .content-panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px;
      display: flex;
      flex-direction: column;
    }

    /* glow line */
    .glow-line {
      width: 180px;
      height: 4px;
      background: linear-gradient(90deg, transparent, var(--blue), var(--cyan), transparent);
      border-radius: 2px;
      margin-bottom: 28px;
      box-shadow: 0 0 24px #00b4ffaa, 0 0 60px #00b4ff44;
    }

    /* heading */
    .section-heading {
      font-family: "Syne", sans-serif;
      font-size: 1.7rem;
      font-weight: 800;
      color: var(--white);
      display: inline-block;
    }

    .section-heading::after {
      content: "";
      display: block;
      width: 44px;
      height: 3px;
      background: linear-gradient(90deg, var(--blue), var(--cyan));
      border-radius: 2px;
      margin-top: 8px;
      box-shadow: 0 0 10px #00b4ff99;
    }

    .map-wrap {
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--border);
      margin: 28px 0 24px;
      height: 260px;
      position: relative;
    }

    .map-wrap iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
    .info-cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 32px;
    }

    .info-card {
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: border-color .2s, box-shadow .2s;
      text-decoration: none;
    }

    .info-card:hover {
      border-color: rgba(0, 180, 255, .4);
      box-shadow: 0 0 20px #00b4ff18;
    }

    .info-card-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: rgba(0, 180, 255, .12);
      border: 1px solid rgba(0, 180, 255, .2);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .info-card-icon svg {
      width: 20px;
      height: 20px;
    }

    .info-card-text {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .info-card-label {
      font-size: .72rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .07em;
    }

    .info-card-val {
      font-size: .88rem;
      color: var(--white);
      font-weight: 600;
    }

    /* FORM */
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .form-label {
      font-size: .85rem;
      color: var(--muted);
      font-weight: 500;
    }

    .form-input,
    .form-textarea {
      width: 100%;
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      color: var(--white);
      font-family: "DM Sans", sans-serif;
      font-size: .92rem;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      resize: none;
    }

    .form-input::placeholder,
    .form-textarea::placeholder {
      color: var(--muted);
    }

    .form-input:focus,
    .form-textarea:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(0, 180, 255, .1);
    }

    .form-textarea {
      height: 150px;
    }

    .form-status {
      font-size: .8rem;
      min-height: 18px;
      margin-top: 2px;
    }

    .form-status.err {
      color: var(--red);
    }

    /* SEND BUTTON */
    .send-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 36px;
      border-radius: 10px;
      background: var(--blue);
      color: #000;
      font-family: "DM Sans", sans-serif;
      font-weight: 700;
      font-size: .95rem;
      border: none;
      cursor: pointer;
      box-shadow: 0 0 20px #00b4ff44;
      transition: all .25s;
      margin-top: 8px;
    }

    .send-btn:hover:not(:disabled) {
      background: var(--cyan);
      transform: translateY(-2px);
      box-shadow: 0 0 32px #00eeff66;
    }

    .send-btn:disabled {
      opacity: .6;
      cursor: not-allowed;
    }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 28px;
      right: 28px;
      z-index: 999;
      padding: 14px 24px;
      border-radius: 12px;
      font-size: .9rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, .4);
      transform: translateY(80px);
      opacity: 0;
      transition: all .35s cubic-bezier(.4, 0, .2, 1);
      pointer-events: none;
      max-width: 320px;
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    .toast.success {
      background: #0d2b1f;
      border: 1px solid var(--green);
      color: var(--green);
    }

    .toast.error {
      background: #2b0d13;
      border: 1px solid var(--red);
      color: var(--red);
    }

    .toast svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
      flex-shrink: 0;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }

    .leaflet-control-attribution {
      display: none !important;
    }

    .leaflet-control-zoom a {
      background: var(--card2) !important;
      color: var(--blue) !important;
      border-color: var(--border) !important;
    }

    .leaflet-control-zoom a:hover {
      background: var(--blue) !important;
      color: #000 !important;
    }

    @media(max-width:900px) {
      .page {
        grid-template-columns: 1fr;
        padding: 20px 16px;
      }

      .sidebar {
        position: static;
        width: 100%;
        max-width: 360px;
        margin: 0 auto;
      }

      .info-cards,
      .form-row {
        grid-template-columns: 1fr;
      }

      .content-panel {
        padding: 24px 20px;
      }
    }
  </style>
</head>

  <script>
    const MY_EMAIL = "mayankpriyadarshi25@gmail.com";

    // TOAST helper
    function showToast(msg, type) {
      const t = document.getElementById("toast");
      const ico = document.getElementById("toast-icon");
      document.getElementById("toast-msg").textContent = msg;
      t.className = "toast " + type;
      ico.innerHTML = type === "success"
        ? '<polyline points="20 6 9 17 4 12" stroke-width="2"/>'
        : '<circle cx="12" cy="12" r="10" stroke-width="2"/><line x1="12" y1="8" x2="12" y2="13" stroke-width="2"/><circle cx="12" cy="16" r="1" fill="currentColor"/>';
      t.classList.add("show");
      setTimeout(() => t.classList.remove("show"), 5000);
    }

    document
      .getElementById("contact-form")
      .addEventListener("submit", async function (event) {
        event.preventDefault(); // page reload na ho

        // button disable + text change (optional feedback)
        const btn = event.target.querySelector("button");
        btn.disabled = true;
        const originalBtnHTML = btn.innerHTML;
        btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
    style="width:18px;height:18px;animation:spin .8s linear infinite">
    <path d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" opacity=".25"/>
    <path d="M21 12a9 9 0 00-9-9"/>
  </svg> Sending...`;

        try {
            const formData = new FormData(this);
            const payload = {
                name: formData.get("from_name"),
                email: formData.get("reply_to"),
                msg: formData.get("message")
            };
            
            const response = await fetch("https://mayankpriyadarshi25-github-io.onrender.com/api/contact", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                showToast("Message sent successfully! Thank you.", "success");
                this.reset();
            } else {
                const errData = await response.json();
                showToast("Failed to send: " + (errData.error || "Unknown Error"), "error");
            }
        } catch (error) {
            showToast("Failed to send: " + error.message, "error");
        } finally {
            btn.disabled = false;
            btn.innerHTML = originalBtnHTML;
        }
      });
      

    // Leaflet map — Delhi NCR
    window.addEventListener("DOMContentLoaded", function () {
      var map = L.map("map", { zoomControl: true, scrollWheelZoom: false }).setView([28.6139, 77.2090], 11);

      // CartoDB Dark Matter — free, no API key, dark themed
      L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
        maxZoom: 19,
        subdomains: "abcd",
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/">CARTO</a>'
      }).addTo(map);

      // Custom glowing blue marker
      var markerIcon = L.divIcon({
        className: "",
        html: '<div style="width:16px;height:16px;border-radius:50%;background:#00b4ff;border:3px solid #fff;box-shadow:0 0 0 4px rgba(0,180,255,.35),0 0 16px #00b4ff;"></div>',
        iconSize: [16, 16],
        iconAnchor: [8, 8]
      });

      L.marker([28.6139, 77.2090], { icon: markerIcon })
        .addTo(map)
        .bindPopup("<b style='font-family:sans-serif;color:#111'>Delhi NCR, India</b>")
        .openPopup();
    });
  </script>
</body>

</html>
