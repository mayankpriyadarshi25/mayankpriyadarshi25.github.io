<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>News — Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d0d0d; --card:#111318; --card2:#16191f;
  --blue:#00b4ff; --cyan:#00eeff;
  --white:#e8f0ff; --muted:#7a8ab0;
  --border:rgba(0,180,255,.12);
  --red:#ff4d6d; --green:#00e096;
  --yellow:#ffd166;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--white);font-family:"DM Sans",sans-serif;min-height:100vh;}

/* ── TOP BAR ── */
.topbar{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 5%;
  background:rgba(13,13,13,.85);
  backdrop-filter:blur(18px);
  border-bottom:1px solid var(--border);
}
.topbar-logo{font-family:"Syne",sans-serif;font-size:1.3rem;font-weight:800;color:var(--white);}
.topbar-logo span{color:var(--blue);}
.admin-btn{
  display:flex;align-items:center;gap:8px;
  padding:8px 18px;border-radius:8px;
  background:rgba(0,180,255,.08);
  border:1px solid rgba(0,180,255,.25);
  color:var(--blue);font-size:.85rem;font-weight:600;
  cursor:pointer;transition:all .2s;font-family:"DM Sans",sans-serif;
}
.admin-btn:hover{background:rgba(0,180,255,.18);}
.admin-btn svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:2;}

/* ── PAGE LAYOUT ── */
.page{max-width:860px;margin:0 auto;padding:100px 24px 60px;}

/* glow line */
.glow-line{width:180px;height:4px;background:linear-gradient(90deg,transparent,var(--blue),var(--cyan),transparent);border-radius:2px;margin-bottom:20px;box-shadow:0 0 24px #00b4ffaa,0 0 60px #00b4ff44;}

/* heading */
.page-heading{font-family:"Syne",sans-serif;font-size:2.2rem;font-weight:800;color:var(--white);margin-bottom:8px;}
.page-sub{font-size:.9rem;color:var(--muted);margin-bottom:36px;}

/* search */
.search-wrap{position:relative;margin-bottom:32px;}
.search-input{
  width:100%;background:var(--card);
  border:1px solid var(--border);border-radius:12px;
  padding:14px 48px 14px 18px;
  color:var(--white);font-family:"DM Sans",sans-serif;font-size:.93rem;
  outline:none;transition:border-color .2s,box-shadow .2s;
}
.search-input::placeholder{color:var(--muted);}
.search-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(0,180,255,.1);}
.search-icon{position:absolute;right:16px;top:50%;transform:translateY(-50%);width:18px;height:18px;fill:none;stroke:var(--muted);stroke-width:2;pointer-events:none;}

/* ── NEWS LIST ── */
.news-list{display:flex;flex-direction:column;gap:12px;}

.news-card{
  display:flex;align-items:center;gap:16px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;
  padding:18px 22px;
  cursor:pointer;
  transition:border-color .25s,box-shadow .25s,transform .2s;
  text-decoration:none;
}
.news-card:hover{
  border-color:rgba(0,180,255,.4);
  box-shadow:0 0 28px #00b4ff14;
  transform:translateX(4px);
}
.news-card-icon{
  width:40px;height:40px;border-radius:10px;
  background:rgba(0,180,255,.08);
  border:1px solid rgba(0,180,255,.18);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.news-card-icon svg{width:18px;height:18px;fill:none;stroke:var(--blue);stroke-width:1.8;}
.news-card-body{flex:1;min-width:0;}
.news-card-title{
  font-family:"Syne",sans-serif;font-size:1rem;font-weight:700;
  color:var(--blue);margin-bottom:4px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.news-card-meta{font-size:.8rem;color:var(--muted);display:flex;align-items:center;gap:10px;}
.news-card-tag{
  background:rgba(0,180,255,.1);border:1px solid rgba(0,180,255,.2);
  border-radius:5px;padding:1px 8px;font-size:.72rem;color:var(--blue);font-weight:600;
}
.news-card-arrow{
  width:28px;height:28px;border-radius:8px;
  background:rgba(255,255,255,.04);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.news-card-arrow svg{width:14px;height:14px;fill:none;stroke:var(--muted);stroke-width:2;}
.news-card:hover .news-card-arrow svg{stroke:var(--blue);}

/* empty state */
.empty-state{text-align:center;padding:60px 20px;color:var(--muted);}
.empty-state svg{width:48px;height:48px;margin:0 auto 16px;display:block;opacity:.3;fill:none;stroke:var(--muted);stroke-width:1.5;}
.empty-state p{font-size:.9rem;}

/* ── NEWS DETAIL MODAL ── */
.modal-overlay{
  display:none;position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,.75);backdrop-filter:blur(6px);
  align-items:center;justify-content:center;padding:24px;
}
.modal-overlay.open{display:flex;}
.modal{
  background:var(--card);border:1px solid var(--border);
  border-radius:20px;width:100%;max-width:680px;
  max-height:90vh;overflow-y:auto;
  padding:36px 40px;position:relative;
}
.modal-close{
  position:absolute;top:18px;right:18px;
  width:34px;height:34px;border-radius:8px;
  background:rgba(255,255,255,.06);border:none;
  color:var(--muted);cursor:pointer;font-size:1.2rem;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;
}
.modal-close:hover{background:rgba(255,100,100,.15);color:var(--red);}
.modal-tag{display:inline-block;background:rgba(0,180,255,.1);border:1px solid rgba(0,180,255,.2);border-radius:6px;padding:3px 12px;font-size:.78rem;color:var(--blue);font-weight:600;margin-bottom:14px;}
.modal-title{font-family:"Syne",sans-serif;font-size:1.5rem;font-weight:800;color:var(--white);margin-bottom:10px;line-height:1.3;}
.modal-meta{font-size:.82rem;color:var(--muted);margin-bottom:24px;display:flex;align-items:center;gap:12px;}
.modal-divider{height:1px;background:var(--border);margin-bottom:24px;}
.modal-body{font-size:.95rem;line-height:1.85;color:var(--muted);white-space:pre-wrap;}
.modal-link{
  display:inline-flex;align-items:center;gap:8px;
  margin-top:24px;padding:10px 22px;border-radius:8px;
  background:rgba(0,180,255,.08);border:1px solid rgba(0,180,255,.25);
  color:var(--blue);font-size:.88rem;font-weight:600;
  text-decoration:none;transition:all .2s;
}
.modal-link:hover{background:rgba(0,180,255,.18);}
.modal-link svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2;}

/* ── ADMIN PANEL ── */
.admin-overlay{
  display:none;position:fixed;inset:0;z-index:300;
  background:rgba(0,0,0,.8);backdrop-filter:blur(8px);
  align-items:center;justify-content:center;padding:24px;
}
.admin-overlay.open{display:flex;}
.admin-box{
  background:var(--card);border:1px solid var(--border);
  border-radius:20px;width:100%;max-width:560px;
  max-height:92vh;overflow-y:auto;
  padding:36px 40px;position:relative;
}
.admin-heading{font-family:"Syne",sans-serif;font-size:1.3rem;font-weight:800;color:var(--white);margin-bottom:24px;display:flex;align-items:center;gap:10px;}
.admin-heading svg{width:20px;height:20px;fill:none;stroke:var(--blue);stroke-width:2;}

/* form elements in admin */
.aform-group{display:flex;flex-direction:column;gap:8px;margin-bottom:16px;}
.aform-label{font-size:.83rem;color:var(--muted);font-weight:500;}
.aform-input,.aform-textarea,.aform-select{
  width:100%;background:var(--card2);
  border:1px solid var(--border);border-radius:10px;
  padding:12px 14px;color:var(--white);
  font-family:"DM Sans",sans-serif;font-size:.9rem;
  outline:none;transition:border-color .2s;resize:none;
}
.aform-input::placeholder,.aform-textarea::placeholder{color:var(--muted);}
.aform-input:focus,.aform-textarea:focus,.aform-select:focus{border-color:var(--blue);}
.aform-select option{background:var(--card2);}
.aform-textarea{height:110px;}
.aform-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

/* admin buttons */
.btn-primary{display:inline-flex;align-items:center;gap:8px;padding:11px 24px;border-radius:9px;background:var(--blue);color:#000;font-family:"DM Sans",sans-serif;font-weight:700;font-size:.9rem;border:none;cursor:pointer;transition:all .25s;}
.btn-primary:hover{background:var(--cyan);}
.btn-danger{display:inline-flex;align-items:center;gap:8px;padding:8px 16px;border-radius:8px;background:rgba(255,77,109,.1);color:var(--red);border:1px solid rgba(255,77,109,.25);font-family:"DM Sans",sans-serif;font-size:.82rem;font-weight:600;cursor:pointer;transition:all .2s;}
.btn-danger:hover{background:rgba(255,77,109,.2);}
.btn-edit{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;background:rgba(0,180,255,.08);color:var(--blue);border:1px solid rgba(0,180,255,.2);font-family:"DM Sans",sans-serif;font-size:.82rem;font-weight:600;cursor:pointer;transition:all .2s;}
.btn-edit:hover{background:rgba(0,180,255,.18);}
.btn-ghost{display:inline-flex;align-items:center;gap:8px;padding:11px 24px;border-radius:9px;background:transparent;color:var(--muted);border:1px solid var(--border);font-family:"DM Sans",sans-serif;font-size:.9rem;cursor:pointer;transition:all .2s;}
.btn-ghost:hover{color:var(--white);border-color:rgba(255,255,255,.3);}

/* admin news list */
.admin-news-list{display:flex;flex-direction:column;gap:10px;margin-bottom:24px;}
.admin-news-item{
  background:var(--card2);border:1px solid var(--border);
  border-radius:12px;padding:14px 16px;
  display:flex;align-items:center;gap:12px;
}
.admin-news-item-title{flex:1;font-size:.9rem;color:var(--white);font-weight:500;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.admin-news-item-tag{font-size:.72rem;color:var(--blue);background:rgba(0,180,255,.1);border-radius:5px;padding:2px 8px;flex-shrink:0;}
.admin-actions{display:flex;gap:8px;flex-shrink:0;}

/* password screen */
.pw-box{text-align:center;}
.pw-icon{width:56px;height:56px;border-radius:16px;background:rgba(0,180,255,.1);border:1px solid rgba(0,180,255,.2);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;}
.pw-icon svg{width:26px;height:26px;fill:none;stroke:var(--blue);stroke-width:2;}
.pw-title{font-family:"Syne",sans-serif;font-size:1.2rem;font-weight:800;color:var(--white);margin-bottom:6px;}
.pw-sub{font-size:.85rem;color:var(--muted);margin-bottom:24px;}
.pw-err{font-size:.82rem;color:var(--red);margin-top:8px;min-height:18px;}

/* toast */
.toast{position:fixed;bottom:28px;right:28px;z-index:999;padding:12px 22px;border-radius:12px;font-size:.88rem;font-weight:600;display:flex;align-items:center;gap:10px;box-shadow:0 8px 32px rgba(0,0,0,.4);transform:translateY(80px);opacity:0;transition:all .35s cubic-bezier(.4,0,.2,1);pointer-events:none;}
.toast.show{transform:translateY(0);opacity:1;}
.toast.success{background:#0d2b1f;border:1px solid var(--green);color:var(--green);}
.toast.error{background:#2b0d13;border:1px solid var(--red);color:var(--red);}

/* section label */
.section-label{font-size:.78rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-weight:600;margin-bottom:10px;}
.divider{height:1px;background:var(--border);margin:20px 0;}

/* count badge */
.count-badge{display:inline-flex;align-items:center;justify-content:center;background:rgba(0,180,255,.1);border-radius:6px;padding:2px 10px;font-size:.8rem;color:var(--blue);font-weight:600;margin-left:10px;}

@media(max-width:600px){
  .page{padding:90px 16px 40px;}
  .modal,.admin-box{padding:24px 20px;}
  .aform-row{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<!-- TOP BAR -->
<header class="topbar">
  <div class="topbar-logo" style="display:flex; align-items:center; gap:12px;">
    <a href="portfolio.html" style="display:flex; align-items:center; justify-content:center; width:36px; height:36px; border-radius:10px; background:rgba(0,180,255,.1); border:1px solid rgba(0,180,255,.2); color:var(--blue); text-decoration:none; transition:all .2s;" title="Home" onmouseover="this.style.background='var(--blue)'; this.style.color='#000';" onmouseout="this.style.background='rgba(0,180,255,.1)'; this.style.color='var(--blue)';">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
    </a>
    <div>Port<span>folio</span></div>
  </div>
  <button class="admin-btn" onclick="openAdminLogin()">
    <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
    Admin Panel
  </button>
</header>

<!-- PAGE -->
<div class="page">
  <div class="glow-line"></div>
  <h1 class="page-heading">News <span id="total-badge" class="count-badge">0</span></h1>
  <p class="page-sub">Latest updates, articles and posts — click any to read</p>

  <!-- Search -->
  <div class="search-wrap">
    <input class="search-input" id="searchInput" type="text" placeholder="Search news by title or tag..." oninput="renderNews()"/>
    <svg class="search-icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
  </div>

  <!-- News list -->
  <div class="news-list" id="newsList"></div>
</div>

<!-- ── NEWS DETAIL MODAL ── -->
<div class="modal-overlay" id="detailModal">
  <div class="modal">
    <button class="modal-close" onclick="closeDetail()">✕</button>
    <div id="modal-tag" class="modal-tag"></div>
    <h2 class="modal-title" id="modal-title"></h2>
    <div class="modal-meta" id="modal-meta"></div>
    <div class="modal-divider"></div>
    <div class="modal-body" id="modal-body"></div>
    <div id="modal-link-wrap"></div>
  </div>
</div>

<!-- ── ADMIN LOGIN ── -->
<div class="admin-overlay" id="loginOverlay">
  <div class="admin-box">
    <button class="modal-close" onclick="closeAdminLogin()">✕</button>
    <div class="pw-box">
      <div class="pw-icon"><svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg></div>
      <div class="pw-title">Admin Access</div>
      <div class="pw-sub">Enter your admin credentials to manage news</div>
      <input class="aform-input" id="unInput" type="text" placeholder="Enter admin username" style="margin-bottom:8px;" onkeydown="if(event.key==='Enter') document.getElementById('pwInput').focus()"/>
      <input class="aform-input" id="pwInput" type="password" placeholder="Enter admin password" style="margin-bottom:4px;" onkeydown="if(event.key==='Enter')checkPassword()"/>
      <div class="pw-err" id="pwErr"></div>
      <br/>
      <div style="display:flex;gap:10px;justify-content:center;margin-top:8px;">
        <button class="btn-primary" onclick="checkPassword()">
          <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
          Unlock
        </button>
        <button class="btn-ghost" onclick="closeAdminLogin()">Cancel</button>
      </div>
    </div>
  </div>
</div>

<!-- ── ADMIN PANEL ── -->
<div class="admin-overlay" id="adminPanel">
  <div class="admin-box">
    <button class="modal-close" onclick="closeAdmin()">✕</button>
    <div class="admin-heading">
      <svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
      News Manager
    </div>

    <!-- ADD / EDIT FORM -->
    <div id="addSection">
      <div class="section-label" id="formLabel">Add New Post</div>
      <input type="hidden" id="editId" value=""/>
      <div class="aform-group">
        <label class="aform-label">Title *</label>
        <input class="aform-input" id="f_title" placeholder="Post headline..."/>
      </div>
      <div class="aform-row">
        <div class="aform-group">
          <label class="aform-label">Tag / Category *</label>
          <input class="aform-input" id="f_tag" placeholder="e.g. Technology"/>
        </div>
        <div class="aform-group">
          <label class="aform-label">Date</label>
          <input class="aform-input" id="f_date" type="date"/>
        </div>
      </div>
      <div class="aform-group">
        <label class="aform-label">Full Content *</label>
        <textarea class="aform-textarea" id="f_body" placeholder="Write the full news content here..."></textarea>
      </div>
      <div class="aform-group">
        <label class="aform-label">Source Link (optional)</label>
        <input class="aform-input" id="f_link" placeholder="https://..."/>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;">
        <button class="btn-primary" onclick="savePost()">
          <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
          <span id="saveLabel">Publish Post</span>
        </button>
        <button class="btn-ghost" id="cancelEditBtn" style="display:none;" onclick="cancelEdit()">Cancel Edit</button>
      </div>
    </div>

    <div class="divider"></div>

    <!-- EXISTING POSTS -->
    <div class="section-label">Existing Posts <span id="admin-count" class="count-badge">0</span></div>
    <div class="admin-news-list" id="adminNewsList"></div>

    <div style="margin-top:8px;">
      <button class="btn-ghost" onclick="closeAdmin()">Close Panel</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"><span id="toast-msg"></span></div>

<script>
const API_BASE = "/api";
const STORAGE_KEY = "portfolio_news_v1";

// Default sample news (shown until admin adds real ones)
const DEFAULT_NEWS = [
  { id: 1, title: "Next.js 15 Released with Turbopack", tag: "Technology", date: "2025-06-10", body: "Next.js 15 brings major performance improvements including stable Turbopack support, improved caching strategies, and React 19 compatibility. Developers can now enjoy faster local development builds and better production optimization.", link: "https://nextjs.org" },
  { id: 2, title: "AI Takes Over Software Testing Industry", tag: "AI / ML", date: "2025-06-09", body: "Artificial intelligence tools are now capable of writing, running, and evaluating test suites with minimal human input. Leading companies report up to 70% reduction in QA time using AI-assisted testing pipelines.", link: "" },
  { id: 3, title: "React Server Components Best Practices", tag: "Frontend", date: "2025-06-08", body: "A comprehensive guide on when and how to use React Server Components in production applications. Key takeaways include avoiding over-fetching, structuring data flows correctly, and mixing client/server components efficiently.", link: "" },
  { id: 4, title: "PostgreSQL 17 Performance Benchmarks", tag: "Database", date: "2025-06-07", body: "The latest PostgreSQL release shows remarkable query performance improvements — up to 2x faster on write-heavy workloads. Connection pooling and parallel query execution receive the biggest upgrades.", link: "" },
  { id: 5, title: "India's Tech Sector Grows 18% in 2025", tag: "Industry News", date: "2025-06-06", body: "India's technology sector continues its explosive growth trajectory, driven by AI adoption, cloud infrastructure investment, and a surge in startup funding. Delhi NCR and Bangalore remain the two largest tech hubs.", link: "" },
  { id: 6, title: "CSS Container Queries Now Fully Supported", tag: "Frontend", date: "2025-06-05", body: "All major browsers now fully support CSS Container Queries, enabling developers to build truly component-responsive designs without JavaScript. This marks a major milestone in modern CSS capabilities.", link: "" },
  { id: 7, title: "Node.js 22 LTS — What You Need to Know", tag: "Backend", date: "2025-06-04", body: "Node.js 22 enters Long Term Support status. Key features include native WebSocket support, improved ESM compatibility, and the experimental permission model for enhanced security in server environments.", link: "" },
  { id: 8, title: "Open Source AI Models Overtaking Proprietary", tag: "AI / ML", date: "2025-06-03", body: "The open source AI ecosystem is rapidly closing the gap with proprietary models. Llama 3, Mistral and Phi-3 are now beating GPT-3.5 benchmarks, democratizing access to powerful language models.", link: "" },
  { id: 9, title: "Cloud Costs Spike 40% — Tips to Reduce Bills", tag: "DevOps", date: "2025-06-02", body: "Organizations worldwide are seeing significant increases in cloud spending. Experts recommend right-sizing instances, using reserved capacity, implementing autoscaling, and auditing unused resources monthly.", link: "" },
  { id: 10, title: "TypeScript 5.5 Improves Type Inference", tag: "Technology", date: "2025-06-01", body: "TypeScript 5.5 introduces inferred type predicates, making complex type narrowing patterns more intuitive. Developers also get isolated declarations for better monorepo performance.", link: "" },
];

// ── DATA HELPERS ──
let AppData = null;
function fetchAppData() {
  fetch(API_BASE + "/all").then(function(r) { return r.json(); }).then(function(data) {
    AppData = data;
    if (!AppData || Object.keys(AppData).length === 0) { AppData = {}; AppData[STORAGE_KEY] = DEFAULT_NEWS; }
    renderNews();
  }).catch(function(e) {
    AppData = {}; AppData[STORAGE_KEY] = DEFAULT_NEWS;
    renderNews();
  });
}
function getNews() { return (AppData && AppData[STORAGE_KEY]) ? AppData[STORAGE_KEY] : DEFAULT_NEWS; }
async function saveNews(arr) { 
  if (!AppData) AppData = {};
  AppData[STORAGE_KEY] = arr;
  try {
    await fetch(API_BASE + "/data", {
      method: "POST",
      headers: { "Content-Type": "application/json", "Authorization": sessionStorage.getItem("admin_auth_token") || "" },
      body: JSON.stringify({ key: STORAGE_KEY, value: arr })
    });
  } catch(e) { console.error("Save error", e); }
}
function nextId(arr) {
  return arr.length ? Math.max(...arr.map(n => n.id)) + 1 : 1;
}
function fmtDate(d) {
  if (!d) return "";
  try { return new Date(d).toLocaleDateString("en-IN", { day:"numeric", month:"short", year:"numeric" }); } catch(e) { return d; }
}

// ── RENDER NEWS LIST ──
function renderNews() {
  const q = (document.getElementById("searchInput").value || "").toLowerCase();
  const news = getNews();
  const filtered = q ? news.filter(n => n.title.toLowerCase().includes(q) || n.tag.toLowerCase().includes(q)) : news;
  const el = document.getElementById("newsList");
  document.getElementById("total-badge").textContent = news.length;

  if (!filtered.length) {
    el.innerHTML = `<div class="empty-state">
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      <p>${q ? "No news matching your search." : "No news posts yet. Admin can add some!"}</p>
    </div>`;
    return;
  }

  el.innerHTML = filtered.map((n, i) => `
    <div class="news-card" onclick="openDetail(${n.id})">
      <div class="news-card-icon">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      </div>
      <div class="news-card-body">
        <div class="news-card-title">${escHtml(n.title)}</div>
        <div class="news-card-meta">
          <span class="news-card-tag">${escHtml(n.tag)}</span>
          <span>${fmtDate(n.date)}</span>
        </div>
      </div>
      <div class="news-card-arrow">
        <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
    </div>
  `).join("");
}

// ── DETAIL MODAL ──
function openDetail(id) {
  const news = getNews();
  const n = news.find(x => x.id === id);
  if (!n) return;
  document.getElementById("modal-tag").textContent = n.tag;
  document.getElementById("modal-title").textContent = n.title;
  document.getElementById("modal-meta").innerHTML = `<span>${fmtDate(n.date)}</span>`;
  document.getElementById("modal-body").textContent = n.body;
  const lw = document.getElementById("modal-link-wrap");
  lw.innerHTML = n.link ? `<a class="modal-link" href="${escHtml(n.link)}" target="_blank" rel="noopener">
    <svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
    Read Source
  </a>` : "";
  document.getElementById("detailModal").classList.add("open");
  document.body.style.overflow = "hidden";
}
function closeDetail() {
  document.getElementById("detailModal").classList.remove("open");
  document.body.style.overflow = "";
}

// ── ADMIN LOGIN ──
function openAdminLogin() {
  if (sessionStorage.getItem("admin_auth") === "yes") { openAdmin(); return; }
  document.getElementById("loginOverlay").classList.add("open");
  setTimeout(() => { let u = document.getElementById("unInput"); if(u) u.focus(); }, 100);
}
function closeAdminLogin() {
  document.getElementById("loginOverlay").classList.remove("open");
  if(document.getElementById("unInput")) document.getElementById("unInput").value = "";
  if(document.getElementById("pwInput")) document.getElementById("pwInput").value = "";
  document.getElementById("pwErr").textContent = "";
}
async function checkPassword() {
  const un = document.getElementById("unInput").value;
  const val = document.getElementById("pwInput").value;
  try {
    let res = await fetch(API_BASE + "/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username: un, password: val })
    });
    let data = await res.json();
    if (data.success) {
      sessionStorage.setItem("admin_auth", "yes");
      sessionStorage.setItem("admin_auth_token", data.token);
      closeAdminLogin();
      openAdmin();
    } else {
      document.getElementById("pwErr").textContent = data.error || "Incorrect credentials. Try again.";
      document.getElementById("pwInput").value = "";
      document.getElementById("unInput").focus();
    }
  } catch(e) {
    document.getElementById("pwErr").textContent = "Login server error.";
  }
}

// ── ADMIN PANEL ──
function openAdmin() {
  renderAdminList();
  document.getElementById("adminPanel").classList.add("open");
  document.body.style.overflow = "hidden";
  // Set today as default date
  const today = new Date().toISOString().split("T")[0];
  if (!document.getElementById("f_date").value) document.getElementById("f_date").value = today;
}
function closeAdmin() {
  document.getElementById("adminPanel").classList.remove("open");
  document.body.style.overflow = "";
  cancelEdit();
}

function renderAdminList() {
  const news = getNews();
  document.getElementById("admin-count").textContent = news.length;
  const el = document.getElementById("adminNewsList");
  if (!news.length) { el.innerHTML = `<div style="color:var(--muted);font-size:.85rem;text-align:center;padding:16px;">No posts yet.</div>`; return; }
  el.innerHTML = news.map(n => `
    <div class="admin-news-item">
      <div class="admin-news-item-title">${escHtml(n.title)}</div>
      <div class="admin-news-item-tag">${escHtml(n.tag)}</div>
      <div class="admin-actions">
        <button class="btn-edit" onclick="startEdit(${n.id})">
          <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          Edit
        </button>
        <button class="btn-danger" onclick="deletePost(${n.id})">
          <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>
          Del
        </button>
      </div>
    </div>
  `).join("");
}

// ── SAVE / EDIT / DELETE ──
function savePost() {
  const title = document.getElementById("f_title").value.trim();
  const tag   = document.getElementById("f_tag").value.trim();
  const date  = document.getElementById("f_date").value;
  const body  = document.getElementById("f_body").value.trim();
  const link  = document.getElementById("f_link").value.trim();
  const editId = document.getElementById("editId").value;

  if (!title || !tag || !body) { showToast("Please fill in Title, Tag and Content.", "error"); return; }

  const news = getNews();
  if (editId) {
    const idx = news.findIndex(n => n.id === +editId);
    if (idx !== -1) news[idx] = { ...news[idx], title, tag, date, body, link };
    showToast("Post updated!", "success");
  } else {
    news.unshift({ id: nextId(news), title, tag, date, body, link });
    showToast("Post published!", "success");
  }
  saveNews(news);
  clearForm();
  renderAdminList();
  renderNews();
}

function startEdit(id) {
  const n = getNews().find(x => x.id === id);
  if (!n) return;
  document.getElementById("editId").value    = n.id;
  document.getElementById("f_title").value  = n.title;
  document.getElementById("f_tag").value    = n.tag;
  document.getElementById("f_date").value   = n.date;
  document.getElementById("f_body").value   = n.body;
  document.getElementById("f_link").value   = n.link || "";
  document.getElementById("formLabel").textContent  = "Edit Post";
  document.getElementById("saveLabel").textContent  = "Save Changes";
  document.getElementById("cancelEditBtn").style.display = "inline-flex";
  document.getElementById("addSection").scrollIntoView({ behavior: "smooth" });
}
function cancelEdit() {
  clearForm();
  document.getElementById("formLabel").textContent  = "Add New Post";
  document.getElementById("saveLabel").textContent  = "Publish Post";
  document.getElementById("cancelEditBtn").style.display = "none";
}
function clearForm() {
  ["f_title","f_tag","f_body","f_link","editId"].forEach(id => document.getElementById(id).value = "");
  document.getElementById("f_date").value = new Date().toISOString().split("T")[0];
}
function deletePost(id) {
  if (!confirm("Delete this post? This cannot be undone.")) return;
  const news = getNews().filter(n => n.id !== id);
  saveNews(news);
  renderAdminList();
  renderNews();
  showToast("Post deleted.", "error");
}

// ── HELPERS ──
function escHtml(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function showToast(msg, type) {
  const t = document.getElementById("toast");
  document.getElementById("toast-msg").textContent = msg;
  t.className = "toast " + type;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 3500);
}

// Close modals on overlay click
document.getElementById("detailModal").addEventListener("click", function(e){ if(e.target===this) closeDetail(); });
document.getElementById("loginOverlay").addEventListener("click", function(e){ if(e.target===this) closeAdminLogin(); });
document.getElementById("adminPanel").addEventListener("click", function(e){ if(e.target===this) closeAdmin(); });

// Keyboard shortcuts
document.addEventListener("keydown", function(e) {
  if (e.key === "Escape") { closeDetail(); closeAdminLogin(); closeAdmin(); }
});

// Init
fetchAppData();
</script>
</body>
</html>
